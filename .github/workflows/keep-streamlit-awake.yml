name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Resolve app URL
        id: resolve
        env:
          STREAMLIT_APP_URL_VAR: ${{ vars.STREAMLIT_APP_URL }}
          STREAMLIT_APP_URL_SECRET: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          APP_URL="${STREAMLIT_APP_URL_VAR:-$STREAMLIT_APP_URL_SECRET}"
          if [ -z "$APP_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "STREAMLIT_APP_URL is not configured."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browser
        if: steps.resolve.outputs.skip == 'false'
        run: |
          npm init -y
          npm install playwright@1.54.2
          npx playwright install --with-deps chromium

      - name: Wake Streamlit app in headless browser
        if: steps.resolve.outputs.skip == 'false'
        env:
          APP_URL: ${{ steps.resolve.outputs.app_url }}
        run: |
          cat > wake-streamlit.mjs <<'EOF'
          import { chromium } from "playwright";

          const appUrl = (process.env.APP_URL || "").replace(/\/$/, "") + "/";
          if (!appUrl) {
            throw new Error("APP_URL is missing.");
          }

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({
            userAgent: "github-actions-keep-awake-browser",
          });
          let wakeClicked = false;

          try {
            const response = await page.goto(appUrl, {
              waitUntil: "domcontentloaded",
              timeout: 120000,
            });

            if (!response) {
              throw new Error("No initial response was received from the app.");
            }

            await page.waitForLoadState("networkidle", { timeout: 120000 }).catch(() => {});
            const maxAttempts = 36;
            const pollDelayMs = 10000;
            let lastHealth = null;

            for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
              const wakeButton = page.getByRole("button", {
                name: /get this app back up/i,
              });
              const wakeButtonVisible = await wakeButton
                .first()
                .isVisible({ timeout: 1000 })
                .catch(() => false);

              if (wakeButtonVisible) {
                console.log(`Attempt ${attempt}/${maxAttempts} sleeping page detected.`);
                await wakeButton.first().click();
                wakeClicked = true;
                await page.waitForLoadState("networkidle", { timeout: 120000 }).catch(() => {});
                await page.waitForTimeout(3000);
              }

              const finalUrl = page.url();
              const health = await page.evaluate(async (rootUrl) => {
                const healthUrl = new URL("/_stcore/health", rootUrl).toString();
                const res = await fetch(healthUrl, {
                  method: "GET",
                  credentials: "include",
                  cache: "no-store",
                });
                return {
                  status: res.status,
                  body: await res.text(),
                };
              }, appUrl);

              const trimmedBody = (health.body || "").trim();
              const bodyPreview = trimmedBody.replace(/\s+/g, " ").slice(0, 160);
              const isHtmlShell =
                /^<!doctype html/i.test(trimmedBody) || /<html[\s>]/i.test(trimmedBody);
              const isHealthy = health.status === 200 && trimmedBody.toLowerCase() === "ok";

              lastHealth = { finalUrl, status: health.status, bodyPreview };

              console.log(
                `Attempt ${attempt}/${maxAttempts} finalUrl=${finalUrl} status=${health.status} bodyPreview=${bodyPreview || "<empty>"}`
              );

              if (isHealthy) {
                console.log("Streamlit backend health responded with ok.");
                break;
              }

              if (attempt === maxAttempts) {
                const shellHint = isHtmlShell
                  ? " Received Streamlit shell HTML instead of backend health."
                  : "";
                throw new Error(
                  `Timed out waiting for Streamlit backend health.${shellHint} wakeClicked=${wakeClicked} Last status=${health.status}, bodyPreview=${bodyPreview || "<empty>"}`
                );
              }

              await page.waitForTimeout(pollDelayMs);
            }

            if (!lastHealth || lastHealth.bodyPreview.toLowerCase() !== "ok") {
              throw new Error("Streamlit backend did not confirm healthy state.");
            }
          } finally {
            await browser.close();
          }
          EOF

          node wake-streamlit.mjs
