name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve app URL
        id: resolve
        env:
          STREAMLIT_APP_URL_VAR: ${{ vars.STREAMLIT_APP_URL }}
          STREAMLIT_APP_URL_SECRET: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          APP_URL="${STREAMLIT_APP_URL_VAR:-$STREAMLIT_APP_URL_SECRET}"
          if [ -z "$APP_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "STREAMLIT_APP_URL is not configured."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Ping Streamlit app
        if: steps.resolve.outputs.skip == 'false'
        env:
          APP_URL: ${{ steps.resolve.outputs.app_url }}
        run: |
          ROOT_URL="${APP_URL%/}/"
          HEALTH_URL="${APP_URL%/}/_stcore/health"
          COOKIE_JAR="$(mktemp)"

          ROOT_STATUS="$(
            curl --silent --show-error --location \
              --cookie "$COOKIE_JAR" \
              --cookie-jar "$COOKIE_JAR" \
              --max-time 30 \
              --output /dev/null \
              --user-agent "github-actions-keep-awake" \
              --write-out "%{http_code}" \
              "$ROOT_URL"
          )"

          HEALTH_STATUS="$(
            curl --silent --show-error --location \
              --cookie "$COOKIE_JAR" \
              --cookie-jar "$COOKIE_JAR" \
              --max-time 30 \
              --output /dev/null \
              --user-agent "github-actions-keep-awake" \
              --write-out "%{http_code}" \
              "$HEALTH_URL"
          )"

          echo "Root status: $ROOT_STATUS"
          echo "Health status: $HEALTH_STATUS"

          if [ "$ROOT_STATUS" != "200" ] || [ "$HEALTH_STATUS" != "200" ]; then
            echo "Streamlit wake-up ping did not finish successfully."
            exit 1
          fi
