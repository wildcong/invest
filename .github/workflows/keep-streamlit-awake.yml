name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve app URL
        id: resolve
        env:
          STREAMLIT_APP_URL_VAR: ${{ vars.STREAMLIT_APP_URL }}
          STREAMLIT_APP_URL_SECRET: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          APP_URL="${STREAMLIT_APP_URL_VAR:-$STREAMLIT_APP_URL_SECRET}"
          if [ -z "$APP_URL" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "STREAMLIT_APP_URL is not configured."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "app_url=$APP_URL" >> "$GITHUB_OUTPUT"

      - name: Ping Streamlit app
        if: steps.resolve.outputs.skip == 'false'
        env:
          APP_URL: ${{ steps.resolve.outputs.app_url }}
        run: |
          HEALTH_URL="${APP_URL%/}/_stcore/health"
          RESPONSE_HEADERS="$(mktemp)"

          curl --head --silent --show-error \
            --max-time 30 \
            --user-agent "github-actions-keep-awake" \
            --dump-header "$RESPONSE_HEADERS" \
            "$HEALTH_URL" >/dev/null

          if grep -qi 'location: https://share.streamlit.io/-/auth/app' "$RESPONSE_HEADERS"; then
            echo "Streamlit app requires authentication, so GitHub Actions cannot keep it awake anonymously."
            echo "Make the app public or use an authenticated local wake-up job instead."
            exit 0
          fi

          curl --fail --silent --show-error \
            --max-time 30 \
            --user-agent "github-actions-keep-awake" \
            "$HEALTH_URL" >/dev/null
